<!DOCTYPE html>
<html lang="en">

<style>
    tr{
        color: black;    }
</style>
<head>
    
    <link rel="stylesheet" type="text/css" href="vicky.css">
    
</head>

<body>
    <form>

        <br><br><br>
        <center>

            <fieldset style ="width:400px; border-radius: 20px;background-color: antiquewhite;">
                <h2 style="color: crimson; font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;">Customer Registration</h2>
            <table>

                <br><br>

                <tr>
                    <td>Full Name</td>
                    <td><input type="text" name="fn1" id="fn2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Email</td>
                    <td><input type="text" name="em1" id="em2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Phone Number</td>
                    <td><input type="number" name="pn1" id="pn2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Aadhar Number</td>
                    <td><input type="number" name="adh1" id="adh2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Date</td>
                    <td><input type="date" name="dat1" id="dat2" required></td>
                </tr>

                <tr>
                    <td>Gender</td>
                    <td><input type="radio" name="Gender"value="Male" id="gen1">Male
                    <input type="radio" name="Gender"value="Female" id="gen2">Female
                    <input type="radio" name="Gender"value="Others" id="gen3">Others </td>
                </tr>

                <tr>
                    <td>Driving Licence No.</td>
                    <td><input type="number" name="dl1" id="dl2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Address</td>
                    <td><textarea rows="4" cols="20" name="ad1" id="ad2"></textarea></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>City</td>
                    <td><input type="text" name="ct1" id="ct2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>State</td>
                    <td><input type="text" name="st1" id="st2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Pincode</td>
                    <td><input type="number" name="pc1" id="pc2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Password</td>
                    <td><input type="text" name="pas1" id="pas2" required></td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>Vehicle Type</td>
                    <td> <input type="radio" name="Vehicle Type"value="2 Wheeler" id="vet1">2 Wheeler
                    <input type="radio" name="Vehicle Type"value="4 Wheeler" id="vet2">4 Wheeler </td>
                </tr>

                <td></td>
                <td></td>

                <tr>
                    <td>For how many<br>days do you need</td>
                    <td><input type="text" name="sug1" id="sug2" required></td>
                </tr>

                <td></td>

                <tr>
                     <td><p><input type="submit" value="Register" style="width: 250%; display: block; margin: auto; background-color: rgb(95, 4, 242);"></p></td>
                </tr>







            </table>
            </fieldset>
        </center>
    </form>
</body>
</html>
